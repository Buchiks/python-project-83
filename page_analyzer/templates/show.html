<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <div class="container-fluid px-0">
            <ul class="navbar-nav flex-row gap-4 mb-0">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}">Анализатор страниц</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('show') }}">Сайты</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="p-3 ms-5">
        <h1 class="">Сайты</h1>
        <table class="table table-bordered w-75 ">
            <thead>
                <tr>
                    <th class="col-1 fw-semibold">ID</th>
                    <th class="col-4 fw-semibold">Имя</th>
                    <th class="col-4 fw-semibold">Последняя проверка</th>
                    <th class="col-3 fw-semibold">Код ответа</th>
                </tr>
            </thead>
            <tbody>
                {% for url in urls %}
                <tr>
                    <td class="col-1">{{ url.id }}</td>
                    <td class="col-4"><a href="{{ url_for('url_show', id=url.id) }}">{{ url.name }}</a></td>

                    <td class="col-4">
                        {% if url.last_date %}
                        {{ url.last_date }}
                        {% endif %}
                    </td>
                    <td class="col-3"></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
