<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор страниц</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</head>

<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <div class="container-fluid px-0">
            <ul class="navbar-nav flex-row gap-4 mb-0">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}">Анализатор страниц</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('show') }}">Сайты</a>
                </li>
            </ul>
        </div>
    </nav>
    {% if errors %}
    <div class="alert alert-danger alert-dismissable fade show" role="alert">
        <strong>{{ errors }}</strong>
    </div>
    {% endif %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-11 col-lg-9">
                <div class="border rounded-1 bg-light p-4 p-md-5 text-center">
                    <h1 class="display-3 fw-semibold m-3">Анализатор страниц</h1>
                    <p class="m-3">Бесплатно проверяйте сайты на SEO-пригодность</p>
                    <form action="/urls" method="post" class="d-flex gap-2">
                        <input class="form-control flex-grow-1" type="text" name="url"
                            placeholder="https://www.example.com" , value="{{ url.name }}">
                        <button type="submit" class="btn btn-primary btn-lg">ПРОВЕРИТЬ</button>
                </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
